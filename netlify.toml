# Optional: use this if you connect the repo to Netlify via Git instead of drag-and-drop.
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  # Only used for Git-based Netlify deploys. Drag-and-drop uses public/config.js instead.
  VITE_API_URL = "https://japaneselearningapp-iota.vercel.app/api"
  # Also set in Vercel: ALLOWED_ORIGINS=https://nihongoj.netlify.app,http://localhost:5173
